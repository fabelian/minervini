<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KOSPI Momentum / Breakout Monitor</title>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<style>
  :root {
    --bg: #0d1117; --bg2: #161b22; --border: #30363d; --text: #c9d1d9;
    --muted: #8b949e; --accent: #58a6ff; --green: #3fb950; --red: #f85149;
    --orange: #f78166; --purple: #bc8cff; --teal: #56d4dd;
  }
  * { box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Malgun Gothic", sans-serif;
         margin: 0; background: var(--bg); color: var(--text); }
  header { background: var(--bg2); padding: 16px 24px; border-bottom: 1px solid var(--border); }
  h1 { margin: 0; font-size: 20px; color: var(--accent); }
  .subtitle { font-size: 12px; color: var(--muted); margin-top: 4px; }
  main { max-width: 1400px; margin: 0 auto; padding: 24px; }
  .controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 24px; }
  .controls input, .controls button {
    padding: 8px 14px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--bg); color: var(--text); font-size: 14px;
  }
  .controls button { cursor: pointer; background: #238636; border-color: #2ea043; color: white; font-weight: 600; }
  .controls button:disabled { background: var(--border); border-color: var(--border); cursor: not-allowed; }
  .controls .status { font-size: 12px; color: var(--muted); }
  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .kpi { background: var(--bg2); padding: 14px 16px; border-radius: 8px; border: 1px solid var(--border); }
  .kpi-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .kpi-value { font-size: 22px; font-weight: 700; margin-top: 4px; color: #f0f6fc; }
  .kpi-value.green { color: var(--green); }
  .kpi-value.red { color: var(--red); }
  .charts { display: grid; grid-template-columns: 1fr; gap: 16px; }
  @media (min-width: 980px) { .charts { grid-template-columns: 1fr 1fr; } .charts > .full { grid-column: span 2; } }
  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px 16px; }
  .card-title { font-size: 14px; font-weight: 600; margin-bottom: 8px; }
  .chart { height: 280px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { padding: 6px 10px; border-bottom: 1px solid #21262d; text-align: right; }
  th:nth-child(-n+2), td:nth-child(-n+2) { text-align: left; }
  td.align-left, th.align-left { text-align: left; }
  th { color: var(--muted); font-weight: 500; text-transform: uppercase; font-size: 11px; }
  tr:hover { background: #1a2230; }
  .green { color: var(--green); }
  .red { color: var(--red); }
  details { margin-top: 16px; }
  summary { cursor: pointer; color: var(--accent); font-size: 13px; padding: 6px 0; }
  .png-img { width: 100%; max-width: 900px; margin-top: 12px; border-radius: 8px; border: 1px solid var(--border); }
  .footer { padding: 24px; text-align: center; font-size: 12px; color: var(--muted); }
  .empty { color: var(--muted); padding: 12px 0; }
  .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid var(--muted);
             border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; vertical-align: -2px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* 우하단 플로팅 챗 패널 */
  .chat-panel { position: fixed; bottom: 20px; right: 20px; width: 380px; height: 540px;
                background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
                display: flex; flex-direction: column; box-shadow: 0 8px 32px rgba(0,0,0,0.55);
                z-index: 1000; transition: height 0.18s, width 0.18s; }
  .chat-panel[data-open="false"] { height: 44px; overflow: hidden; }
  .chat-header { display: flex; gap: 8px; align-items: center; padding: 10px 12px;
                 border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; }
  .chat-header > .chat-title { font-weight: 600; flex: 1; color: var(--accent); font-size: 13px; }
  .chat-header select { background: var(--bg); color: var(--text); border: 1px solid var(--border);
                        border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; }
  .chat-header button { background: transparent; border: none; color: var(--text); cursor: pointer;
                        font-size: 14px; padding: 0 6px; line-height: 1; }
  .chat-body { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
  .chat-msg { max-width: 90%; padding: 8px 12px; border-radius: 10px; font-size: 13px;
              line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
  .chat-msg.user { background: #1f6feb; color: white; align-self: flex-end; }
  .chat-msg.assistant { background: #21262d; color: var(--text); align-self: flex-start; border: 1px solid var(--border); }
  .chat-msg.error { background: #5a1d1d; color: #ffb4b4; align-self: flex-start; }
  .chat-msg.thinking { opacity: 0.7; font-style: italic; }
  .chat-empty { color: var(--muted); font-size: 12px; padding: 8px; text-align: center; }
  .chat-input { display: flex; gap: 8px; padding: 8px 10px; border-top: 1px solid var(--border); }
  .chat-input textarea { flex: 1; background: var(--bg); color: var(--text); border: 1px solid var(--border);
                         border-radius: 6px; padding: 6px 8px; resize: none; font-family: inherit;
                         font-size: 13px; outline: none; }
  .chat-input textarea:focus { border-color: var(--accent); }
  .chat-input button { background: #238636; color: white; border: none; border-radius: 6px;
                       padding: 0 14px; cursor: pointer; font-weight: 600; }
  .chat-input button:disabled { background: var(--border); cursor: not-allowed; }
</style>
</head>
<body>
<header>
  <h1>KOSPI Momentum / Breakout Leading Indicator Monitor</h1>
  <div class="subtitle">Minervini-style 트렌드 템플릿 + IBD RS + 경로 의존적 hit rate</div>
</header>
<main>
  <div class="controls">
    <label>대상 종목 수
      <input type="number" id="maxStocks" value="50" min="5" max="1000" style="width:80px;margin-left:6px;">
    </label>
    <label>기준일
      <input type="date" id="asOf" style="margin-left:6px;">
    </label>
    <button id="runBtn">실행</button>
    <button id="clearAsOfBtn" type="button" title="기준일을 비워 오늘 기준으로 실행">오늘</button>
    <span class="status" id="status">준비됨</span>
  </div>

  <div id="kpiArea"></div>

  <div class="charts" id="chartsArea"></div>

  <details open>
    <summary>Sector rotation 랭킹 (BSR / MFHR by sector)</summary>
    <div id="sectorArea"></div>
  </details>

  <details open>
    <summary>오늘의 Quality 브레이크아웃 종목 (RS≥70)</summary>
    <div id="picksArea"></div>
  </details>

  <details>
    <summary>서버 사이드 Matplotlib 대시보드 PNG</summary>
    <div id="pngArea"></div>
  </details>
</main>
<div class="footer">github.com/fabelian/minervini · KOSPI 한정</div>

<div class="chat-panel" id="chatPanel" data-open="false">
  <div class="chat-header" id="chatHeader">
    <span class="chat-title">AI 챗</span>
    <select id="chatModel" title="모델 선택">
      <option value="claude-sonnet-4-6">Sonnet 4.6</option>
      <option value="claude-opus-4-7">Opus 4.7</option>
      <option value="claude-haiku-4-5-20251001">Haiku 4.5</option>
      <option value="openrouter:openai/gpt-4o">GPT-4o (OR)</option>
      <option value="openrouter:openai/gpt-4o-mini">GPT-4o-mini (OR)</option>
      <option value="openrouter:google/gemini-2.0-flash-001">Gemini 2 Flash (OR)</option>
      <option value="openrouter:deepseek/deepseek-chat">DeepSeek (OR)</option>
    </select>
    <button id="chatClear" title="대화 초기화">⟲</button>
    <button id="chatToggle" title="패널 토글">▢</button>
  </div>
  <div class="chat-body" id="chatBody">
    <div class="chat-empty" id="chatEmpty">질문을 입력하면 대시보드 데이터까지 직접 조회해 답합니다.</div>
  </div>
  <div class="chat-input">
    <textarea id="chatInput" placeholder="질문을 입력하세요 (Enter=전송, Shift+Enter=줄바꿈)" rows="2"></textarea>
    <button id="chatSend">전송</button>
  </div>
</div>

<script>
const LAYOUT = {
  paper_bgcolor: '#161b22',
  plot_bgcolor: '#161b22',
  font: { color: '#c9d1d9', size: 11 },
  xaxis: { gridcolor: '#21262d', linecolor: '#30363d' },
  yaxis: { gridcolor: '#21262d', linecolor: '#30363d' },
  margin: { l: 50, r: 30, t: 10, b: 40 },
  legend: { x: 0, y: 1.12, orientation: 'h', font: { size: 10 } },
};
const PCFG = { displayModeBar: false, responsive: true };

const fmtPct = v => v == null || isNaN(v) ? '—' : (v * 100).toFixed(1) + '%';
const fmtInt = v => v == null || isNaN(v) ? '—' : Math.round(v).toLocaleString();
const fmtNum = (v, d = 2) => v == null || isNaN(v) ? '—' : Number(v).toFixed(d);
const colorPct = (v, hi = 0.55, lo = 0.4) => v == null ? '' : (v >= hi ? 'green' : (v <= lo ? 'red' : ''));

function renderKPIs(s) {
  const l = s.latest || {};
  const items = [
    { label: 'As-of', value: s.as_of || '—' },
    { label: '집계 종목', value: fmtInt(s.n_stocks) },
    { label: '% > SMA200', value: fmtPct(l.pct_above_sma200), cls: colorPct(l.pct_above_sma200, 0.5, 0.4) },
    { label: '% > SMA50', value: fmtPct(l.pct_above_sma50) },
    { label: '% Trend Template', value: fmtPct(l.pct_passing_template), cls: colorPct(l.pct_passing_template, 0.3, 0.15) },
    { label: '52주 신고가', value: fmtInt(l.new_highs), cls: l.new_highs > 0 ? 'green' : '' },
    { label: '52주 신저가', value: fmtInt(l.new_lows), cls: l.new_lows > 0 ? 'red' : '' },
    { label: 'Quality 브레이크아웃', value: fmtInt(l.quality_breakouts) },
    { label: '20d 브레이크아웃 hit rate', value: fmtPct(l.bo_hit_rate), cls: colorPct(l.bo_hit_rate) },
    { label: '모멘텀 데실 hit rate', value: fmtPct(l.factor_hit_rate), cls: colorPct(l.factor_hit_rate) },
    { label: 'Rotation score', value: fmtNum(l.rotation_score, 3),
      cls: l.rotation_score == null ? '' : (l.rotation_score >= 0.15 ? 'green' : (l.rotation_score < 0.05 ? 'red' : '')) },
    { label: '주도 섹터', value: l.top_sector || '—', cls: 'green' },
    { label: '약세 섹터', value: l.bottom_sector || '—', cls: 'red' },
    { label: '평균 RS rank', value: fmtNum(l.avg_rs_rank, 1) },
  ];
  document.getElementById('kpiArea').innerHTML = '<div class="kpi-grid">' +
    items.map(it => `<div class="kpi"><div class="kpi-label">${it.label}</div><div class="kpi-value ${it.cls || ''}">${it.value}</div></div>`).join('') +
    '</div>';
}

function trace(name, data, color, opts = {}) {
  const x = (data || []).map(p => p.date);
  const y = (data || []).map(p => opts.scale ? p.value * opts.scale : p.value);
  const t = { x, y, name };
  if (opts.type === 'bar') {
    t.type = 'bar';
    t.marker = { color };
  } else {
    t.type = 'scatter';
    t.mode = 'lines';
    t.line = { color, width: 1.6 };
  }
  return t;
}

function chartCard(id, title, full = false) {
  const wrap = document.createElement('div');
  wrap.className = 'card' + (full ? ' full' : '');
  wrap.innerHTML = `<div class="card-title">${title}</div><div id="${id}" class="chart"></div>`;
  return wrap;
}

function renderCharts(series) {
  const area = document.getElementById('chartsArea');
  area.innerHTML = '';

  const c1 = chartCard('c-kospi', 'KOSPI 종합지수', true);
  area.appendChild(c1);
  Plotly.newPlot('c-kospi', [trace('KOSPI', series.kospi, '#c9d1d9')],
    Object.assign({}, LAYOUT), PCFG);

  const c2 = chartCard('c-breadth', '시장 폭 (Breadth) %');
  area.appendChild(c2);
  Plotly.newPlot('c-breadth', [
    trace('% > SMA200', series.pct_above_sma200, '#58a6ff', { scale: 100 }),
    trace('% > SMA50', series.pct_above_sma50, '#79c0ff', { scale: 100 }),
    trace('% Trend Template', series.pct_passing_template, '#3fb950', { scale: 100 }),
  ], Object.assign({}, LAYOUT, { yaxis: Object.assign({}, LAYOUT.yaxis, { ticksuffix: '%' }) }), PCFG);

  const c3 = chartCard('c-nh', '신고가 / 신저가');
  area.appendChild(c3);
  const nlData = (series.new_lows || []).map(p => ({ date: p.date, value: -p.value }));
  Plotly.newPlot('c-nh', [
    trace('52주 신고가', series.new_highs, '#3fb950', { type: 'bar' }),
    trace('52주 신저가', nlData, '#f85149', { type: 'bar' }),
  ], Object.assign({}, LAYOUT, { barmode: 'relative' }), PCFG);

  const c4 = chartCard('c-bo', '브레이크아웃 카운트');
  area.appendChild(c4);
  Plotly.newPlot('c-bo', [
    trace('Pivot', series.pivot_breakouts, '#79c0ff'),
    trace('Quality', series.quality_breakouts, '#f78166'),
  ], Object.assign({}, LAYOUT), PCFG);

  const c5 = chartCard('c-hit', '롤링 Hit Rate (Leading Indicator) %', true);
  area.appendChild(c5);
  Plotly.newPlot('c-hit', [
    trace('20d 브레이크아웃 hit rate', series.bo_hit_rate, '#bc8cff', { scale: 100 }),
    trace('모멘텀 데실 +ret hit rate', series.factor_hit_rate_pos, '#56d4dd', { scale: 100 }),
    trace('모멘텀 데실 +5% hit rate', series.factor_hit_rate_5pct, '#f78166', { scale: 100 }),
  ], Object.assign({}, LAYOUT, { yaxis: Object.assign({}, LAYOUT.yaxis, { ticksuffix: '%' }) }), PCFG);

  const c6 = chartCard('c-rot', 'Sector rotation score (BSR/MFHR 섹터 분산)', true);
  area.appendChild(c6);
  Plotly.newPlot('c-rot', [
    trace('Rotation score', series.rotation_score, '#f0b400'),
    trace('BSR spread', series.bsr_spread, '#bc8cff'),
    trace('MFHR spread', series.mfhr_spread, '#56d4dd'),
  ], Object.assign({}, LAYOUT), PCFG);
}

function renderSectorRanking(ranking) {
  const el = document.getElementById('sectorArea');
  if (!ranking || ranking.length === 0) {
    el.innerHTML = '<p class="empty">섹터 매핑 또는 시그널 부족.</p>';
    return;
  }
  const cols = [
    { k: 'sector', t: 'Sector' },
    { k: 'bsr', t: 'BSR', fmt: v => (v * 100).toFixed(1) + '%' },
    { k: 'bsr_n', t: 'BSR n', fmt: v => Math.round(v) },
    { k: 'mfhr', t: 'MFHR', fmt: v => (v * 100).toFixed(1) + '%' },
    { k: 'mfhr_n', t: 'MFHR n', fmt: v => Math.round(v) },
    { k: 'composite_rank', t: 'Composite', fmt: v => v.toFixed(1) },
  ];
  let html = '<table><thead><tr>' + cols.map(c => `<th>${c.t}</th>`).join('') + '</tr></thead><tbody>';
  for (const r of ranking) {
    html += '<tr>';
    for (const c of cols) {
      const v = r[c.k];
      if (v == null || (typeof v === 'number' && isNaN(v))) { html += '<td>—</td>'; continue; }
      let cls = '';
      if (c.k === 'bsr' || c.k === 'mfhr') cls = v >= 0.55 ? 'green' : (v <= 0.4 ? 'red' : '');
      const text = c.fmt ? c.fmt(v) : v;
      html += `<td class="${cls}">${text}</td>`;
    }
    html += '</tr>';
  }
  html += '</tbody></table>';
  el.innerHTML = html;
}

function renderPicks(picks) {
  const el = document.getElementById('picksArea');
  if (!picks || picks.length === 0) {
    el.innerHTML = '<p class="empty">오늘 시그널 없음.</p>';
    return;
  }
  const cols = [
    { k: 'code', t: 'Code' }, { k: 'name', t: 'Name' },
    { k: 'sector', t: 'Sector', align: 'left' },
    { k: 'close', t: 'Close', fmt: v => v.toLocaleString() },
    { k: 'rs_rank', t: 'RS Rank', fmt: v => v.toFixed(1) },
    { k: 'ret_3m', t: '3M Ret', fmt: v => (v * 100).toFixed(1) + '%', signed: true },
    { k: 'ret_6m', t: '6M Ret', fmt: v => (v * 100).toFixed(1) + '%', signed: true },
    { k: 'pct_from_high', t: '52W high까지', fmt: v => (v * 100).toFixed(1) + '%', signed: true },
    { k: 'vol_ratio', t: 'Vol×', fmt: v => v.toFixed(2) + 'x' },
  ];
  const alignClass = c => c.align === 'left' ? 'align-left' : '';
  let html = '<table><thead><tr>' + cols.map(c => `<th class="${alignClass(c)}">${c.t}</th>`).join('') + '</tr></thead><tbody>';
  for (const p of picks) {
    html += '<tr>';
    for (const c of cols) {
      const v = p[c.k];
      const al = alignClass(c);
      if (v == null || v === '' || (typeof v === 'number' && isNaN(v))) {
        html += `<td class="${al}">—</td>`; continue;
      }
      const cls = (c.signed ? (v > 0 ? 'green' : (v < 0 ? 'red' : '')) : '') + (al ? ' ' + al : '');
      const text = c.fmt ? c.fmt(v) : v;
      html += `<td class="${cls.trim()}">${text}</td>`;
    }
    html += '</tr>';
  }
  html += '</tbody></table>';
  el.innerHTML = html;
}

function renderPNG() {
  document.getElementById('pngArea').innerHTML =
    `<img class="png-img" src="/api/dashboard.png?t=${Date.now()}" onerror="this.replaceWith(Object.assign(document.createElement('p'),{className:'empty',textContent:'PNG 미생성'}))">`;
}

function renderResult(summary) {
  renderKPIs(summary);
  renderCharts(summary.series || {});
  renderSectorRanking(summary.sector_ranking || []);
  renderPicks(summary.picks || []);
  renderPNG();
}

let pollTimer = null;
async function poll(jobId, runBtn, statusEl) {
  try {
    const r = await fetch(`/api/status/${jobId}`);
    const j = await r.json();
    statusEl.innerHTML = `<span class="spinner"></span> 상태: ${j.status}` +
      (j.started_at ? ` · 시작 ${j.started_at}` : '');
    if (j.status === 'completed') {
      clearInterval(pollTimer); pollTimer = null;
      const rr = await fetch(`/api/result/${jobId}`);
      const summary = await rr.json();
      renderResult(summary);
      statusEl.textContent = `완료 · job ${jobId} · ${summary.as_of || ''}`;
      runBtn.disabled = false;
    } else if (j.status === 'failed') {
      clearInterval(pollTimer); pollTimer = null;
      statusEl.textContent = `실패: ${j.error || 'unknown'}`;
      runBtn.disabled = false;
    }
  } catch (e) {
    statusEl.textContent = '폴링 오류: ' + e.message;
  }
}

document.getElementById('clearAsOfBtn').addEventListener('click', () => {
  document.getElementById('asOf').value = '';
});

document.getElementById('runBtn').addEventListener('click', async () => {
  const max_stocks = parseInt(document.getElementById('maxStocks').value) || null;
  const as_of = document.getElementById('asOf').value || null;
  const btn = document.getElementById('runBtn');
  const status = document.getElementById('status');
  btn.disabled = true;
  status.innerHTML = '<span class="spinner"></span> 제출 중…';
  try {
    const r = await fetch('/api/run', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ max_stocks, as_of }),
    });
    const j = await r.json();
    const tag = as_of ? ` · as-of ${as_of}` : '';
    status.innerHTML = `<span class="spinner"></span> 대기 (job ${j.job_id})${tag}`;
    if (pollTimer) clearInterval(pollTimer);
    pollTimer = setInterval(() => poll(j.job_id, btn, status), 2000);
  } catch (e) {
    status.textContent = '오류: ' + e.message;
    btn.disabled = false;
  }
});

// 초기 로드: 가장 최근 결과 가져오기
(async () => {
  try {
    const r = await fetch('/api/latest');
    if (r.ok) {
      const j = await r.json();
      if (j.summary) {
        renderResult(j.summary);
        document.getElementById('status').textContent =
          `이전 결과 · job ${j.job_id} · ${j.summary.as_of || ''}`;
      }
    }
  } catch (e) { /* ignore */ }
})();

// 우하단 챗 패널
(() => {
  const panel = document.getElementById('chatPanel');
  const header = document.getElementById('chatHeader');
  const toggle = document.getElementById('chatToggle');
  const clearBtn = document.getElementById('chatClear');
  const body = document.getElementById('chatBody');
  const emptyHint = document.getElementById('chatEmpty');
  const input = document.getElementById('chatInput');
  const send = document.getElementById('chatSend');
  const modelSel = document.getElementById('chatModel');
  const history = [];

  function setOpen(open) {
    panel.dataset.open = String(!!open);
    toggle.textContent = open ? '–' : '▢';
    if (open) setTimeout(() => input.focus(), 100);
  }
  setOpen(false);

  header.addEventListener('click', e => {
    if (e.target === modelSel || e.target === clearBtn) return;
    setOpen(panel.dataset.open !== 'true');
  });

  clearBtn.addEventListener('click', e => {
    e.stopPropagation();
    history.length = 0;
    body.innerHTML = '';
    body.appendChild(emptyHint);
  });

  function addMsg(role, text) {
    if (emptyHint.parentNode === body) emptyHint.remove();
    const div = document.createElement('div');
    div.className = 'chat-msg ' + role;
    div.textContent = text;
    body.appendChild(div);
    body.scrollTop = body.scrollHeight;
    return div;
  }

  async function doSend() {
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    addMsg('user', text);
    history.push({ role: 'user', content: text });
    const thinking = addMsg('assistant thinking', '⋯ 생각 중…');
    send.disabled = true;
    const sel = modelSel.value;
    let provider = 'anthropic';
    let model = sel;
    if (sel.startsWith('openrouter:')) {
      provider = 'openrouter';
      model = sel.slice('openrouter:'.length);
    }
    try {
      const r = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history, model, provider }),
      });
      const j = await r.json();
      if (!r.ok) {
        thinking.className = 'chat-msg error';
        thinking.textContent = j.detail || ('오류: HTTP ' + r.status);
        return;
      }
      thinking.className = 'chat-msg assistant';
      thinking.textContent = j.reply || '(빈 응답)';
      history.push({ role: 'assistant', content: j.reply || '' });
    } catch (e) {
      thinking.className = 'chat-msg error';
      thinking.textContent = '오류: ' + e.message;
    } finally {
      send.disabled = false;
      body.scrollTop = body.scrollHeight;
    }
  }

  send.addEventListener('click', doSend);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      doSend();
    }
  });
})();
</script>
</body>
</html>
